<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e63946">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PokéScan">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Pokémon Card Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Password overlay (shown on first visit or after session expiry) -->
  <div id="password-overlay" hidden>
    <div id="password-picker">
      <h2>🔒 PokéScan</h2>
      <input id="password-input" type="password" placeholder="Passwort" autocomplete="current-password" />
      <button id="password-btn">Einloggen</button>
      <p id="password-error" hidden>Falsches Passwort</p>
    </div>
  </div>

  <!-- Profile picker overlay (shown before any content) -->
  <div id="profile-overlay" hidden>
    <div id="profile-picker">
      <h2>Wer bist du?</h2>
      <div id="profile-buttons">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Main app (hidden until profile selected) -->
  <div id="app" hidden>
    <header>
      <h1>🔍 PokéScan</h1>
      <button id="profile-switch-btn"></button>
    </header>

    <div id="tab-scanner" hidden>
      <!-- Left / top: camera -->
      <section id="scanner-panel">
        <div id="viewfinder">
          <video id="video" autoplay playsinline muted></video>
          <div id="guide">↑ Untere Kartenkante auf den Strich legen</div>
        </div>
        <button id="capture-btn">📸 Karte scannen</button>
        <canvas id="canvas" hidden></canvas>

        <div id="manual-entry">
          <p>oder Nummer manuell eingeben</p>
          <div id="manual-row">
            <input id="manual-num" type="text" inputmode="numeric" pattern="\d*"
                   placeholder="045" autocomplete="off" maxlength="4" />
            <span id="manual-slash">/</span>
            <input id="manual-total" type="text" inputmode="numeric" pattern="\d*"
                   placeholder="198" autocomplete="off" maxlength="4" />
            <button id="manual-btn">🔍</button>
          </div>
        </div>
      </section>

      <!-- Right / bottom: result -->
      <section id="result-panel">
        <div id="loading" hidden><span class="spinner"></span> Wird gescannt…</div>

        <div id="card-info" hidden>
          <img id="card-image" alt="Card image" />
          <div id="card-details">
            <h2 id="card-name"></h2>
            <p id="card-set"></p>
            <p id="card-number"></p>
            <p id="card-owned"></p>
          </div>
          <button id="add-to-collection-btn">➕ Zur Sammlung</button>
          <button id="scan-again-btn">🔄 Weiter scannen</button>
        </div>

        <div id="multi-match" hidden>
          <p>Mehrere Karten gefunden – aus welchem Set?</p>
          <ul id="match-list"></ul>
          <button id="scan-again-btn-2">🔄 Weiter scannen</button>
        </div>

        <div id="error-msg" hidden></div>
        <button id="scan-again-btn-3" hidden>🔄 Weiter scannen</button>

        <details id="debug" hidden>
          <summary>Debug info</summary>
          <p>OCR raw: <code id="debug-ocr"></code></p>
          <img id="debug-image" alt="Preprocessed ROI" style="max-width:100%;margin-top:0.5rem;border-radius:6px"/>
        </details>
      </section>
    </div>

    <!-- Collection tab -->
    <div id="tab-collection">
      <div id="collection-header">
        <span id="collection-count">0 Karten</span>
      </div>
      <div id="chip-bar">
        <div class="chip-group" id="sort-chips">
          <button class="chip active" data-sort="newest">Neueste</button>
          <button class="chip" data-sort="name-asc">Name ↑</button>
          <button class="chip" data-sort="name-desc">Name ↓</button>
          <button class="chip" data-sort="quantity">Häufigste</button>
        </div>
        <div class="chip-group" id="filter-chips">
          <button class="chip active" data-filter="all">Alle</button>
          <button class="chip" data-filter="doubles">Doppelt</button>
          <button class="chip" data-filter="pokemon">Pokémon</button>
          <button class="chip" data-filter="trainer">Trainer</button>
          <button class="chip" data-filter="energy">Energie</button>
        </div>
      </div>
      <div id="card-grid"></div>
    </div>

    <!-- Bottom tab bar -->
    <nav id="tab-bar">
      <button class="tab active" data-tab="collection">📚 Sammlung</button>
      <button class="tab" data-tab="scanner">📸 Scanner</button>
    </nav>
  </div>

  <!-- Card detail overlay (for collection view) -->
  <div id="detail-overlay" hidden>
    <div id="detail-content">
      <button id="detail-close">✕</button>
      <img id="detail-image" alt="" />
      <h2 id="detail-name"></h2>
      <p id="detail-set"></p>
      <p id="detail-number"></p>
      <p id="detail-meta"></p>
      <div id="detail-qty-row">
        <button id="detail-minus">−</button>
        <span id="detail-qty">1</span>
        <button id="detail-plus">＋</button>
      </div>
      <div id="detail-remove-row">
        <button id="detail-remove-btn">🗑 Entfernen</button>
        <div id="detail-confirm" hidden>
          Wirklich entfernen?
          <button id="detail-confirm-yes">Ja</button>
          <button id="detail-confirm-no">Nein</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
