<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Card Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🔍 Pokémon Card Scanner</h1>
  </header>

  <main>
    <!-- Camera view -->
    <section id="scanner">
      <div id="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <div id="guide">
          ↘ Kartenecke unten rechts hier einpassen
        </div>
      </div>
      <button id="capture-btn">📸 Karte scannen</button>
      <canvas id="canvas" hidden></canvas>

      <div id="manual-entry">
        <p>oder Nummer manuell eingeben</p>
        <div id="manual-row">
          <input id="manual-num" type="text" inputmode="numeric" pattern="\d*"
                 placeholder="045" autocomplete="off" maxlength="4" />
          <span id="manual-slash">/</span>
          <input id="manual-total" type="text" inputmode="numeric" pattern="\d*"
                 placeholder="198" autocomplete="off" maxlength="4" />
          <button id="manual-btn">🔍</button>
        </div>
      </div>
    </section>

    <!-- Result -->
    <section id="result" hidden>
      <div id="loading" hidden>
        <span class="spinner"></span> Wird gescannt…
      </div>
      <div id="card-info" hidden>
        <img id="card-image" alt="Card image" />
        <div id="card-details">
          <h2 id="card-name"></h2>
          <p id="card-set"></p>
          <p id="card-number"></p>
          <p id="card-hp"></p>
          <p id="card-types"></p>
          <p id="card-rarity"></p>
        </div>
      </div>
      <div id="multi-match" hidden>
        <p>Mehrere Karten gefunden – aus welchem Set ist deine?</p>
        <ul id="match-list"></ul>
      </div>
      <div id="error-msg" hidden></div>
      <details id="debug" hidden>
        <summary>Debug info</summary>
        <p>OCR raw: <code id="debug-ocr"></code></p>
        <img id="debug-image" alt="Preprocessed ROI" style="max-width:100%;margin-top:0.5rem;border-radius:6px"/>
      </details>
      <button id="scan-again-btn">🔄 Weitere Karte scannen</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
